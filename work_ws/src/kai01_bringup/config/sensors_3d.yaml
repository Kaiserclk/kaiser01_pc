octomap_resolution: 0.01
sensors:
  - camera_1_pointcloud
camera_1_pointcloud:
    sensor_plugin: occupancy_map_monitor/PointCloudOctomapUpdater
    point_cloud_topic: /camera/depth/points
    max_range: 5.0
    point_subsample: 1
    padding_offset: 0.1
    padding_scale: 1.0
    max_update_rate: 4.0
    filtered_cloud_topic: /camera_1/filtered_points
